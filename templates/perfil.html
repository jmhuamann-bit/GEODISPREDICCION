{% extends "base.html" %}
{% block title %}Mi Perfil · GEODIS{% endblock %}
{% block page_title %}Mi Perfil{% endblock %}
{% block content %}
<div class="row g-3">
  <div class="col-12 col-lg-4">
    <div class="gd-card">
      <div class="gd-card-body text-center">
        <div class="gd-avatar mx-auto" style="width:72px;height:72px;font-size:24px;" id="gdProfileAvatar">--</div>
        <div class="mt-3" style="font-weight:700;font-size:16px;" id="gdProfileName">—</div>
        <div style="color:var(--gd-text-muted);font-size:13px;" id="gdProfileEmail">—</div>
        <span class="gd-badge verde mt-2" id="gdProfileRole">—</span>
      </div>
    </div>
  </div>
  <div class="col-12 col-lg-8">
    <div class="gd-card mb-3">
      <div class="gd-card-header"><div class="gd-card-title">Información de la cuenta</div></div>
      <div class="gd-card-body">
        <div class="row g-3">
          <div class="col-6"><div class="gd-label">Cargo</div><div id="gdProfileCargo">—</div></div>
          <div class="col-6"><div class="gd-label">Teléfono</div><div id="gdProfileTelefono">—</div></div>
          <div class="col-6"><div class="gd-label">Último acceso</div><div id="gdProfileUltimoAcceso">—</div></div>
          <div class="col-6"><div class="gd-label">Rol asignado</div><div id="gdProfileRolTexto">—</div></div>
        </div>
      </div>
    </div>

    <div class="gd-card">
      <div class="gd-card-header"><div class="gd-card-title">Cambiar contraseña</div></div>
      <div class="gd-card-body">
        <div id="gdPwdMsg" style="display:none;" class="alert py-2 px-3" style="font-size:13px;"></div>
        <form id="gdPwdForm" class="row g-3">
          <div class="col-12 col-md-4">
            <label class="gd-label">Contraseña actual</label>
            <input type="password" class="form-control gd-input" id="gdPwdActual" required>
          </div>
          <div class="col-12 col-md-4">
            <label class="gd-label">Nueva contraseña</label>
            <input type="password" class="form-control gd-input" id="gdPwdNueva" required minlength="8">
          </div>
          <div class="col-12 col-md-4">
            <label class="gd-label">Confirmar nueva contraseña</label>
            <input type="password" class="form-control gd-input" id="gdPwdConfirmar" required minlength="8">
          </div>
          <div class="col-12">
            <button type="submit" class="gd-btn gd-btn-primary"><i class="fa-solid fa-key"></i> Actualizar contraseña</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.addEventListener("DOMContentLoaded", async () => {
  const { user } = await GeodisAPI.get("/api/auth/me");
  if (!user) return;
  document.getElementById("gdProfileAvatar").textContent = gdInitials(user.nombre_completo);
  document.getElementById("gdProfileName").textContent = user.nombre_completo;
  document.getElementById("gdProfileEmail").textContent = user.email;
  document.getElementById("gdProfileRole").textContent = user.rol;
  document.getElementById("gdProfileCargo").textContent = user.cargo || "—";
  document.getElementById("gdProfileTelefono").textContent = user.telefono || "—";
  document.getElementById("gdProfileRolTexto").textContent = user.rol;
  document.getElementById("gdProfileUltimoAcceso").textContent = user.ultimo_acceso ? gdFormatDate(user.ultimo_acceso) : "Primer acceso";

  document.getElementById("gdPwdForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const msg = document.getElementById("gdPwdMsg");
    const nueva = document.getElementById("gdPwdNueva").value;
    const confirmar = document.getElementById("gdPwdConfirmar").value;
    if (nueva !== confirmar) {
      msg.className = "alert alert-danger py-2 px-3";
      msg.textContent = "Las contraseñas no coinciden.";
      msg.style.display = "block";
      return;
    }
    try {
      await GeodisAPI.post("/api/auth/change-password", {
        password_actual: document.getElementById("gdPwdActual").value,
        password_nueva: nueva,
      });
      msg.className = "alert alert-success py-2 px-3";
      msg.textContent = "Contraseña actualizada correctamente.";
      msg.style.display = "block";
      document.getElementById("gdPwdForm").reset();
    } catch (err) {
      msg.className = "alert alert-danger py-2 px-3";
      msg.textContent = err.message;
      msg.style.display = "block";
    }
  });
});
</script>
{% endblock %}
